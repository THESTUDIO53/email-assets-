<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .subtitle { color: #666; font-size: 13px; margin-bottom: 28px; }
  .layout { display: grid; grid-template-columns: 340px 1fr; gap: 24px; }
  .panel { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .panel h2 { font-size: 14px; color: #333; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #1a9baf; }
  label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; margin-top: 12px; font-weight: bold; }
  label:first-of-type { margin-top: 0; }
  input, select { width: 100%; padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; color: #333; outline: none; transition: border 0.2s; }
  input:focus, select:focus { border-color: #1a9baf; }
  .btn-copy { width: 100%; margin-top: 20px; padding: 12px; background: #1a9baf; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
  .btn-copy:hover { background: #157a90; }
  .btn-copy.success { background: #27ae60; }
  .preview-panel h2 { font-size: 14px; color: #333; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #1a9baf; }
  #preview-frame { width: 100%; border: none; background: white; border-radius: 8px; min-height: 320px; }
  .notice { margin-top: 12px; background: #e8f7f9; border-left: 3px solid #1a9baf; padding: 10px 12px; border-radius: 6px; font-size: 12px; color: #444; line-height: 1.6; }

  .steps li { margin-top: 4px; }
</style>

<div class="container">
  <h1>⚕ Union-Medic | Generator Email Potpisa</h1>
  <p class="subtitle">Unesite podatke i kopirajte potpis direktno u Gmail ili Apple Mail</p>

  <div class="layout">
    <!-- Forma -->
    <div class="panel">
      <h2>Podaci</h2>

      <label>Ime i prezime</label>
      <input type="text" id="ime" value="Milan M. Selaković" oninput="update()">

      <label>Pozicija (srpski)</label>
      <input type="text" id="pozicijaSR" value="Stručni saradnik u kontroli kvaliteta" oninput="update()">

      <label>Pozicija (engleski)</label>
      <input type="text" id="pozicijaEN" value="Expert Associate in Quality Control" oninput="update()">

      <label>Titula (badge)</label>
      <input type="text" id="titula" value="mag.farm | MPharm" oninput="update()">

      <label>Email</label>
      <input type="email" id="email" value="milan.m.selakovic@union-medic.com" oninput="update()">

      <label>Telefon</label>
      <input type="text" id="telefon" value="+381 64 6478 338" oninput="update()">

      <button class="btn-copy" id="copyBtn" onclick="copySignature()">📋 Kopiraj potpis</button>

      <div class="notice">
        <strong>Kako koristiti:</strong>
        <ol class="steps">
          <li>Unesite podatke</li>
          <li>Kliknite "Kopiraj potpis"</li>
          <li>Otvorite Gmail → Settings → Signature</li>
          <li>Paste (Ctrl+V / Cmd+V)</li>
        </ol>
      </div>
    </div>

    <!-- Preview -->
    <div class="panel preview-panel">
      <h2>Pregled</h2>
      <iframe id="preview-frame" scrolling="no"></iframe>
    </div>
  </div>
</div>

function update() {
  const html = getSignatureHTML();
  const frame = document.getElementById('preview-frame');
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write('<html><body style="margin:0;padding:10px;background:#fff;">' + html + '</body></html>');
  doc.close();
  // Auto resize
  setTimeout(() => {
    frame.style.height = (doc.body.scrollHeight + 20) + 'px';
  }, 100);
}

async function copySignature() {
  const html = getSignatureHTML();
  try {
    const blob = new Blob([html], { type: 'text/html' });
    const item = new ClipboardItem({ 'text/html': blob });
    await navigator.clipboard.write([item]);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Kopirano!';
    btn.classList.add('success');
    setTimeout(() => {
      btn.textContent = '📋 Kopiraj potpis';
      btn.classList.remove('success');
    }, 3000);
  } catch(e) {
    // Fallback
    const el = document.createElement('div');
    el.innerHTML = html;
    document.body.appendChild(el);
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    document.body.removeChild(el);
    alert('Kopirano! Sada možete paste-ovati u Gmail.');
  }
}

// Init
window.onload = update;
